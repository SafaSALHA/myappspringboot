apiVersion: apps/v1
kind: Deployment
metadata:
  name: Jenkins-spring-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-app
  template:
    metadata:
      labels:
        app: spring-app
    spec:
      containers:
      - name: Jenkins-spring-app-container
        image: safa318/myappspringboot-image:v1.0
        ports:
        - containerPort: 2222
